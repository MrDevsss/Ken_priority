<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Priority Cooldown</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app" class="hidden">
  <div class="wrapper">

    <!-- POLICE -->
    <div class="group-panel">
      <span class="group-label police-label">POLICE</span>
      <div class="sep">|</div>
      <div class="dot safe" id="dot-police"></div>
      <div class="status-text safe" id="status-police">SAFE</div>
      <div class="sep">|</div>
      <div class="info-row" id="info-police">—</div>
      <div class="sep">|</div>
      <span class="cd-label">CD :</span>
      <span class="cd-value" id="cd-police">0</span>
    </div>

    <!-- DIVIDER -->
    <div class="group-divider"></div>

    <!-- SHERIFF -->
    <div class="group-panel">
      <span class="group-label sheriff-label">SHERIFF</span>
      <div class="sep">|</div>
      <div class="dot safe" id="dot-sheriff"></div>
      <div class="status-text safe" id="status-sheriff">SAFE</div>
      <div class="sep">|</div>
      <div class="info-row" id="info-sheriff">—</div>
      <div class="sep">|</div>
      <span class="cd-label">CD :</span>
      <span class="cd-value" id="cd-sheriff">0</span>
    </div>

  </div>
</div>
<script src="script.js"></script>
</body>
</html>
